name: DataSheet CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install pandas and google-generativeai from your requirements
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Ensure pytest is available for the test step
        pip install pytest

    - name: Run Manual Unit Tests (Security Validator)
      # This satisfies the rubric requirement to run pytest on your manual tests
      run: |
        pytest tests/test_validator.py

    - name: Run Main Pipeline
      # We use 'echo "3"' to select the 'Exit' option in your CLI loop.
      # This allows the Action to verify the code runs without getting stuck.
      run: |
        echo "3" | python my_project/main.py
