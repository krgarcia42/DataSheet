name: DataSheet CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Ensure pytest is installed even if not in requirements
        pip install pytest

    - name: Run Manual Unit Tests (Validator Check)
      # This proves your security logic works before the app runs
      run: |
        pytest tests/test_validator.py

    - name: Test Main Pipeline Execution
      # We use 'echo "3"' to simulate the user choosing 'Exit' 
      # so the CLI doesn't get stuck waiting for input
      run: |
        echo "3" | python my_project/main.py
