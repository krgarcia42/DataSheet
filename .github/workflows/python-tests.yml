name: DataSheet CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest google-generativeai pandas

    - name: Run Manual Unit Tests
      # We set PYTHONPATH to the root so pytest can resolve 'from my_project import ...'
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        pytest tests/test_validator.py

    - name: Run Main Pipeline
      # We use the -m flag to run my_project.main as a module.
      # This is the "Gold Standard" for modular projects to fix import errors.
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        echo "3" | python -m my_project.main
